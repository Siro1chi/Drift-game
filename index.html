<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Drift Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div class="stat">Машина: <span id="car-name">AE86 (Drift)</span></div>
        <div class="stat">Скорость: <span id="speed">0</span> км/ч</div>
        <div class="stat">Угол заноса: <span id="drift-angle">0</span>°</div>
        <div class="stat">Передача: <span id="gear">1</span></div>
        <div class="stat">RPM: <span id="rpm">0</span></div>
        <div class="controls-hint">
            WASD / Стрелки - Управление<br>
            Пробел - Ручник<br>
            E/Q - Переключение передач<br>
            1/2/3 - Выбор машины
        </div>
    </div>
    
    <!-- Магнитола - отдельный элемент справа вверху -->
    <div id="radio">
        <div class="track-name" id="track-name">Нет трека</div>
        <div class="volume-controls">
            <div class="volume-slider">
                <label>🎵 Музыка</label>
                <input type="range" id="music-volume" min="0" max="100" value="50" onchange="setMusicVolume(this.value)">
            </div>
            <div class="volume-slider">
                <label>🔊 Звук</label>
                <input type="range" id="sfx-volume" min="0" max="100" value="70" onchange="setSfxVolume(this.value)">
            </div>
        </div>
        <div class="radio-controls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="toggleMusic()" id="play-btn">▶</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="playRandomTrack()">🔀</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="physics.js"></script>
    <script src="track.js"></script>
    <script src="cars.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
