<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Drift Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">
        <div class="stat-row">
            <div class="stat">🚗 <span id="car-name">AE86</span></div>
            <div class="stat">⏱ <span id="timer">0.000</span></div>
            <div class="stat">👑 <span id="score">0</span></div>
        </div>
        <div class="leaderboard">
            <h3>🏆 Топ-5</h3>
            <div id="records-list"></div>
        </div>
    </div>
    
    <!-- Мобильное управление -->
    <div id="mobile-controls">
        <div class="control-pad">
            <button class="ctrl-btn" id="btn-up">▲</button>
            <div class="ctrl-row">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <button class="ctrl-btn" id="btn-right">▶</button>
            </div>
            <button class="ctrl-btn" id="btn-down">▼</button>
        </div>
        <div class="action-pad">
            <button class="action-btn" id="btn-handbrake">🛑</button>
            <button class="action-btn" id="btn-shift-up">⬆</button>
            <button class="action-btn" id="btn-shift-down">⬇</button>
        </div>
        <div class="car-select">
            <button class="car-btn" onclick="changeCar('ae86')">1</button>
            <button class="car-btn" onclick="changeCar('silvia')">2</button>
            <button class="car-btn" onclick="changeCar('gripMachine')">3</button>
        </div>
    </div>
    
    <!-- Магнитола - отдельный элемент справа вверху -->
    <div id="radio">
        <div class="track-name" id="track-name">Нет трека</div>
        <div class="volume-controls">
            <div class="volume-slider">
                <label>🎵 Музыка</label>
                <input type="range" id="music-volume" min="0" max="100" value="50" onchange="setMusicVolume(this.value)">
            </div>
            <div class="volume-slider">
                <label>🔊 Звук</label>
                <input type="range" id="sfx-volume" min="0" max="100" value="70" onchange="setSfxVolume(this.value)">
            </div>
        </div>
        <div class="radio-controls">
            <button onclick="prevTrack()">⏮</button>
            <button onclick="toggleMusic()" id="play-btn">▶</button>
            <button onclick="nextTrack()">⏭</button>
            <button onclick="playRandomTrack()">🔀</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="physics.js"></script>
    <script src="track.js"></script>
    <script src="cars.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
